services:
  - type: web
    name: productdb-v2-portal
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /_stcore/health
    autoDeployTrigger: commit
    envVars:
      - key: PRODUCTDB_DATA_SOURCE
        value: drive
      - key: PRODUCTDB_USERS_PATH
        value: /tmp/productdb-runtime/auth_users.json
      - key: PRODUCTDB_QUOTATIONS_PATH
        value: /tmp/productdb-runtime/quotations
      - key: PRODUCTDB_LEADS_PATH
        value: /tmp/productdb-runtime/leads.xlsx
      - key: PRODUCTDB_ADMIN_USERNAME
        value: admin
      - key: PRODUCTDB_ADMIN_NAME
        value: Quan tri vien
      - key: PRODUCTDB_ADMIN_PASSWORD
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
